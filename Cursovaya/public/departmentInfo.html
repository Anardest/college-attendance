<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Отделение</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <a href="/menu" class="fw-bold">← Назад</a>

      <h2 class="mt-3 mb-4">Моё отделение</h2>

      <!-- Информация об отделении -->
      <div class="card mb-4">
        <div class="card-body">
          <h5 id="departmentName">Загрузка...</h5>
          <p>Количество групп: <span id="groupsCount">0</span></p>
        </div>
      </div>

      <!-- Таблица групп -->
      <div class="card mb-4">
        <div class="card-body">
          <h5>Группы</h5>
          <table class="table table-bordered">
            <thead>
              <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Преподаватель</th>
                <th>Студентов</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="groupsTable"></tbody>
          </table>
        </div>
      </div>

      <!-- Студенты группы -->
      <div class="card">
        <div class="card-body">
          <h5>Студенты группы</h5>
          <table class="table table-striped">
            <thead>
              <tr>
                <th>ID</th>
                <th>ФИО</th>
              </tr>
            </thead>
            <tbody id="studentsTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:3001";

      function getToken() {
        return localStorage.getItem("authToken");
      }

      async function fetchDepartment() {
        const res = await fetch(`${API_URL}/api/department/groups`, {
          headers: { Authorization: `Bearer ${getToken()}` },
        });

        const data = await res.json();

        if (data.error) {
          alert(data.error);
          return;
        }

        document.getElementById("departmentName").innerText =
          data.department.name;
        document.getElementById("groupsCount").innerText = data.total;

        renderGroups(data.groups);
      }

      function renderGroups(groups) {
        const table = document.getElementById("groupsTable");
        table.innerHTML = "";

        groups.forEach((g) => {
          const row = `
      <tr>
        <td>${g.group_id}</td>
        <td>${g.group_name}</td>
        <td>${g.teacher_fio ?? "-"}</td>
        <td>${g.students_count}</td>
        <td>
          <button class="btn btn-sm btn-primary" onclick="loadGroup(${g.group_id})">Открыть</button>
        </td>
      </tr>
    `;
          table.innerHTML += row;
        });
      }

      async function loadGroup(groupId) {
        const res = await fetch(`${API_URL}/api/department/groups/${groupId}`, {
          headers: { Authorization: `Bearer ${getToken()}` },
        });

        const data = await res.json();

        if (data.error) {
          alert(data.error);
          return;
        }

        renderStudents(data.students);
      }

      function renderStudents(students) {
        const table = document.getElementById("studentsTable");
        table.innerHTML = "";

        students.forEach((s) => {
          const row = `
      <tr>
        <td>${s.student_id}</td>
        <td>${s.fio}</td>
      </tr>
    `;
          table.innerHTML += row;
        });
      }

      fetchDepartment();
    </script>
  </body>
</html>
