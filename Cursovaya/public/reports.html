<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Отчёты посещаемости</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <a href="/menu" class="fw-bold">← Назад</a>

      <h2 class="mt-3 mb-4">Отчёты посещаемости</h2>

      <!-- Controls -->
      <div class="card mb-4">
        <div class="card-body">
          <div class="row g-2">
            <div class="col">
              <select id="reportType" class="form-control">
                <option value="department">По отделению</option>
                <option value="group">По группе</option>
                <option value="student">По студенту</option>
              </select>
            </div>

            <div class="col">
              <input
                id="entityId"
                class="form-control"
                placeholder="ID (отделение / группа / студент)"
                inputmode="numeric"
       oninput="this.value = this.value.replace(/[^0-9]/g, '')"
              />
            </div>

            <div class="col">
              <button class="btn btn-primary w-100" onclick="loadReport()">
                Построить отчёт
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Summary cards -->
      <div class="row mb-4" id="statsCards"></div>

      <!-- Charts -->
      <div class="card mb-4">
        <div class="card-body">
          <canvas id="mainChart"></canvas>
        </div>
      </div>

      <!-- Table -->
      <div class="card">
        <div class="card-body">
          <h5>Детализация</h5>
          <table class="table table-striped">
            <thead>
              <tr>
                <th>Метрика</th>
                <th>Значение</th>
              </tr>
            </thead>
            <tbody id="reportTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      function formatInterval(t) {
        if (!t) return "-";

        // если уже строка
        if (typeof t === "string") return t;

        const hours = String(t.hours ?? 0).padStart(2, "0");
        const minutes = String(t.minutes ?? 0).padStart(2, "0");
        const seconds = String(Math.floor(t.seconds ?? 0)).padStart(2, "0");

        return `${hours}:${minutes}:${seconds}`;
      }
      const API_URL = "http://localhost:3001";
      let chartInstance = null;

      function getToken() {
        return localStorage.getItem("authToken");
      }

      function buildUrl(type, id) {
        return `${API_URL}/api/reports/${type}/${id}`;
      }

      async function loadReport() {
        const type = document.getElementById("reportType").value;
        const id = document.getElementById("entityId").value;

        if (!id) {
          alert("Введите ID");
          return;
        }

        const res = await fetch(buildUrl(type, id), {
          headers: {
            Authorization: `Bearer ${getToken()}`,
          },
        });

        const data = await res.json();

        if (data.error) {
          alert(data.error);
          return;
        }

        renderStats(data);
        renderTable(data);
        renderChart(data);
      }

      function renderStats(data) {
        const container = document.getElementById("statsCards");

        const cards = [
          { label: "Всего записей", value: data.total },
          { label: "Опоздания", value: data.late_count },
          { label: "Ранний уход", value: data.early_exit_count },
        ];

        container.innerHTML = cards
          .map(
            (c) => `
    <div class="col">
      <div class="card text-center p-3">
        <h6>${c.label}</h6>
        <h3>${c.value ?? 0}</h3>
      </div>
    </div>
  `,
          )
          .join("");
      }

      function renderTable(data) {
        const table = document.getElementById("reportTable");

        table.innerHTML = `
    <tr><td>Всего записей</td><td>${data.total ?? 0}</td></tr>
    <tr><td>Опоздания</td><td>${data.late_count ?? 0}</td></tr>
    <tr><td>Ранний уход</td><td>${data.early_exit_count ?? 0}</td></tr>
    <tr><td>Средний приход</td><td>${formatInterval(data.avg_entry_time)}</td></tr>
<tr><td>Средний уход</td><td>${formatInterval(data.avg_exit_time)}</td></tr>
  `;
      }

      function renderChart(data) {
        const ctx = document.getElementById("mainChart");

        const chartData = {
          labels: ["Всего", "Опоздания", "Ранний уход"],
          datasets: [
            {
              label: "Посещаемость",
              data: [data.total, data.late_count, data.early_exit_count],
              borderWidth: 1,
            },
          ],
        };

        if (chartInstance) {
          chartInstance.destroy();
        }

        chartInstance = new Chart(ctx, {
          type: "bar",
          data: chartData,
          options: {
            responsive: true,
            plugins: {
              legend: { display: true },
            },
          },
        });
      }
    </script>
  </body>
</html>
