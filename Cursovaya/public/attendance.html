<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Посещаемость</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <a href="/menu" class="fw-bold">← Назад</a>

      <h2 class="mt-3 mb-4">Посещаемость</h2>

      <!-- Кнопки -->
      <div class="mb-3 d-flex gap-2">
        <button class="btn btn-primary" onclick="fetchAttendance()">
          Обновить
        </button>
        <button class="btn btn-success" onclick="generateAttendance()">
          Сгенерировать 20 записей
        </button>
      </div>

      <!-- Таблица -->
      <table class="table table-bordered table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>Студент</th>
            <th>Группа</th>
            <th>Вход</th>
            <th>Выход</th>
          </tr>
        </thead>
        <tbody id="attendanceTable"></tbody>
      </table>
    </div>

    <script>
      const API_URL = "http://localhost:3001";

      function getToken() {
        return localStorage.getItem("authToken");
      }

      function formatDate(dateStr) {
        if (!dateStr) return "-";
        const d = new Date(dateStr);
        return d.toLocaleString();
      }

      async function fetchAttendance() {
        const res = await fetch(`${API_URL}/api/attendance`, {
          headers: {
            Authorization: `Bearer ${getToken()}`,
          },
        });

        const data = await res.json();

        if (!Array.isArray(data)) {
          alert(data.error || "Ошибка загрузки");
          console.error(data);
          return;
        }

        renderAttendance(data);
      }

      function renderAttendance(records) {
        const table = document.getElementById("attendanceTable");
        table.innerHTML = "";

        records.forEach((r) => {
          const row = `
      <tr>
        <td>${r.attendance_id}</td>
        <td>${r.fio ?? "-"}</td>
        <td>${r.group_name ?? "-"}</td>
        <td>${formatDate(r.entry_time)}</td>
        <td>${formatDate(r.exit_time)}</td>
      </tr>
    `;
          table.innerHTML += row;
        });
      }

      async function generateAttendance() {
        if (!confirm("Сгенерировать 20 записей?")) return;

        const res = await fetch(`${API_URL}/api/attendance/generate`, {
          method: "POST",
          headers: {
            Authorization: `Bearer ${getToken()}`,
          },
        });

        const data = await res.json();

        if (data.error) {
          alert(data.error);
          return;
        }

        fetchAttendance();
      }

      fetchAttendance();
    </script>
  </body>
</html>
