<!doctype html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <title>Отчёт отделения</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">
    <div class="container py-4">
        <a href="/menu" class="fw-bold">← Назад</a>

        <h2 class="mt-3 mb-4">Отчёт по моему отделению</h2>

        <!-- Кнопка обновления -->
        <div class="mb-3 d-flex gap-2">
            <button class="btn btn-primary" onclick="loadReport()">Обновить</button>
            <button class="btn btn-success" onclick="downloadExcel()">Скачать Excel</button>
        </div>

        <!-- Карточки -->
        <div class="row mb-4" id="statsCards"></div>

        <!-- График -->
        <div class="card mb-4">
            <div class="card-body">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <!-- Таблица -->
        <div class="card">
            <div class="card-body">
                <h5>Детали</h5>
                <table class="table table-striped">
                    <tbody id="table"></tbody>
                </table>
            </div>
        </div>

        <h4 class="mt-4">Разбивка по группам</h4>

        <div class="card mb-4">
            <div class="card-body">
                <canvas id="groupsChart"></canvas>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Группа</th>
                            <th>Всего</th>
                            <th>Опоздания</th>
                            <th>Ранний уход</th>
                        </tr>
                    </thead>
                    <tbody id="groupsTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:3001";
        let chartInstance = null;

        function getToken() {
            return localStorage.getItem("authToken");
        }

        function formatTime(t) {
            if (!t) return "-";
            if (typeof t === "string") return t;

            const h = String(t.hours ?? 0).padStart(2, "0");
            const m = String(t.minutes ?? 0).padStart(2, "0");
            const s = String(Math.floor(t.seconds ?? 0)).padStart(2, "0");

            return `${h}:${m}:${s}`;
        }

        async function loadReport() {
            const res = await fetch(`${API_URL}/api/reports/me`, {
                headers: {
                    Authorization: `Bearer ${getToken()}`
                }
            });

            const data = await res.json();

            if (data.error) {
                alert(data.error);
                return;
            }

            renderCards(data.stats);
            renderTable(data.stats);
            renderChart(data.stats);

            renderGroups(data.groups);
            renderGroupsChart(data.groups);
        }

        function renderCards(data) {
            const el = document.getElementById("statsCards");

            el.innerHTML = `
    <div class="col">
      <div class="card text-center p-3">
        <h6>Всего</h6>
        <h3>${data.total ?? 0}</h3>
      </div>
    </div>
    <div class="col">
      <div class="card text-center p-3">
        <h6>Опоздания</h6>
        <h3>${data.late_count ?? 0}</h3>
      </div>
    </div>
    <div class="col">
      <div class="card text-center p-3">
        <h6>Ранний уход</h6>
        <h3>${data.early_exit_count ?? 0}</h3>
      </div>
    </div>
  `;
        }

        function renderTable(data) {
            const table = document.getElementById("table");

            table.innerHTML = `
    <tr><td>Всего записей</td><td>${data.total ?? 0}</td></tr>
    <tr><td>Опоздания</td><td>${data.late_count ?? 0}</td></tr>
    <tr><td>Ранний уход</td><td>${data.early_exit_count ?? 0}</td></tr>
    <tr><td>Средний приход</td><td>${formatTime(data.avg_entry_time)}</td></tr>
    <tr><td>Средний уход</td><td>${formatTime(data.avg_exit_time)}</td></tr>
  `;
        }
        function renderGroups(groups) {
            const table = document.getElementById("groupsTable");
            table.innerHTML = "";

            groups.forEach(g => {
                table.innerHTML += `
      <tr>
        <td>${g.group_name}</td>
        <td>${g.total}</td>
        <td>${g.late_count}</td>
        <td>${g.early_exit_count}</td>
      </tr>
    `;
            });
        }
        let groupsChartInstance = null;

        function renderGroupsChart(groups) {
            const ctx = document.getElementById("groupsChart");

            if (groupsChartInstance) {
                groupsChartInstance.destroy();
            }

            groupsChartInstance = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: groups.map(g => g.group_name),
                    datasets: [
                        {
                            label: "Всего",
                            data: groups.map(g => g.total)
                        },
                        {
                            label: "Опоздания",
                            data: groups.map(g => g.late_count)
                        },
                        {
                            label: "Ранний уход",
                            data: groups.map(g => g.early_exit_count)
                        }
                    ]
                },
                options: {
                    responsive: true
                }
            });
        }
        function renderChart(data) {
            const ctx = document.getElementById("chart");

            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: ["Всего", "Опоздания", "Ранний уход"],
                    datasets: [{
                        label: "Посещаемость",
                        data: [
                            data.total ?? 0,
                            data.late_count ?? 0,
                            data.early_exit_count ?? 0,
                        ],
                    },],
                },
                options: {
                    responsive: true,
                },
            });
        }
        async function downloadExcel() {
            const res = await fetch(`${API_URL}/api/reports/me/export/department`, {
                headers: {
                    Authorization: `Bearer ${getToken()}`
                }
            });

            if (!res.ok) {
                const err = await res.json();
                alert(err.error || "Ошибка скачивания");
                return;
            }

            const blob = await res.blob();

            // создаём ссылку
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "department_report.xlsx";
            document.body.appendChild(a);
            a.click();

            // чистим
            a.remove();
            window.URL.revokeObjectURL(url);
        }

        loadReport();
    </script>
</body>

</html>
