<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Моя группа</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <a href="/menu" class="fw-bold">← Назад</a>

      <h2 class="mt-3">Моя группа</h2>

      <!-- Преподаватель -->
      <div class="card mb-3">
        <div class="card-body">
          <h5>Преподаватель</h5>
          <p><b>ФИО:</b> <span id="teacherFio"></span></p>
          <p><b>Логин:</b> <span id="teacherLogin"></span></p>
        </div>
      </div>

      <!-- Группа -->
      <div class="card mb-3">
        <div class="card-body">
          <h5>Группа</h5>
          <p><b>ID:</b> <span id="groupId"></span></p>
          <p><b>Название:</b> <span id="groupName"></span></p>
          <p><b>Отделение:</b> <span id="departmentName"></span></p>
        </div>
      </div>

      <!-- Статистика -->
      <div class="card mb-4">
        <div class="card-body">
          <h5>Статистика</h5>
          <p><b>Количество студентов:</b> <span id="totalStudents"></span></p>
        </div>
      </div>

      <!-- Таблица студентов -->
      <table class="table table-bordered table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>ФИО</th>
          </tr>
        </thead>
        <tbody id="studentsTable"></tbody>
      </table>
    </div>

    <script>
      const API_URL = "http://localhost:3001";

      function getToken() {
        return localStorage.getItem("authToken");
      }

      async function fetchGroup() {
        try {
          const res = await fetch(`${API_URL}/api/teacher/group`, {
            headers: {
              Authorization: `Bearer ${getToken()}`,
            },
          });

          const data = await res.json();

          if (!res.ok) {
            alert(data.error || "Ошибка");
            return;
          }

          renderData(data);
        } catch (e) {
          alert("Ошибка соединения с сервером");
        }
      }

      function renderData(data) {
        // преподаватель
        document.getElementById("teacherFio").innerText = data.teacher.fio;
        document.getElementById("teacherLogin").innerText = data.teacher.login;

        // группа
        document.getElementById("groupId").innerText = data.group.id;
        document.getElementById("groupName").innerText = data.group.name;
        document.getElementById("departmentName").innerText =
          data.group.department_name || "-";

        // статистика
        document.getElementById("totalStudents").innerText =
          data.statistics.total_students;

        // студенты
        renderStudents(data.students);
      }

      function renderStudents(students) {
        const table = document.getElementById("studentsTable");
        table.innerHTML = "";

        if (!students.length) {
          table.innerHTML = `<tr><td colspan="2" class="text-center">Нет студентов</td></tr>`;
          return;
        }

        students.forEach((s) => {
          const row = `
            <tr>
              <td>${s.student_id}</td>
              <td>${s.fio}</td>
            </tr>
          `;
          table.innerHTML += row;
        });
      }

      fetchGroup();
    </script>
  </body>
</html>
