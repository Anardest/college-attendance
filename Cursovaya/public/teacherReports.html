<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Отчёт группы</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body class="bg-light">
    <div class="container py-4">
      <a href="/menu" class="fw-bold">← Назад</a>
      <h2 class="mt-3 mb-4">Отчёт по моей группе</h2>

      <!-- Общая статистика -->
      <div class="row mb-4" id="stats"></div>

      <!-- График -->
      <div class="card mb-4">
        <div class="card-body">
          <canvas id="chart"></canvas>
        </div>
      </div>

      <!-- Таблица студентов -->
      <div class="card">
        <div class="card-body">
          <h5>Студенты</h5>
          <table class="table table-striped">
            <thead>
              <tr>
                <th>ФИО</th>
                <th>Всего</th>
                <th>Опоздания</th>
                <th>Ранний уход</th>
                <th>Средний приход</th>
                <th>Средний уход</th>
              </tr>
            </thead>
            <tbody id="studentsTable"></tbody>
          </table>
        </div>
        <div class="mb-3">
  <button class="btn btn-success" onclick="downloadExcel()">
    Скачать Excel
  </button>
</div>
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:3001";
      let chartInstance = null;

      function getToken() {
        return localStorage.getItem("authToken");
      }

      function formatTime(t) {
        if (!t) return "-";
        if (typeof t === "string") return t;

        const h = String(t.hours ?? 0).padStart(2, "0");
        const m = String(t.minutes ?? 0).padStart(2, "0");
        const s = String(Math.floor(t.seconds ?? 0)).padStart(2, "0");

        return `${h}:${m}:${s}`;
      }

      async function loadReport() {
        const res = await fetch(`${API_URL}/api/reports/me`, {
          headers: {
            Authorization: `Bearer ${getToken()}`,
          },
        });

        const data = await res.json();

        if (data.error) {
          alert(data.error);
          return;
        }

        renderStats(data.stats);
        renderChart(data.stats);
        renderStudents(data.students);
      }

      function renderStats(data) {
        document.getElementById("stats").innerHTML = `
    <div class="col">
      <div class="card text-center p-3">
        <h6>Всего</h6>
        <h3>${data.total}</h3>
      </div>
    </div>
    <div class="col">
      <div class="card text-center p-3">
        <h6>Опоздания</h6>
        <h3>${data.late_count}</h3>
      </div>
    </div>
    <div class="col">
      <div class="card text-center p-3">
        <h6>Ранний уход</h6>
        <h3>${data.early_exit_count}</h3>
      </div>
    </div>
  `;
      }

      function renderStudents(students) {
        const table = document.getElementById("studentsTable");
        table.innerHTML = "";

        students.forEach((s) => {
          table.innerHTML += `
      <tr>
        <td>${s.fio}</td>
        <td>${s.total}</td>
        <td>${s.late_count}</td>
        <td>${s.early_exit_count}</td>
        <td>${formatTime(s.avg_entry_time)}</td>
        <td>${formatTime(s.avg_exit_time)}</td>
      </tr>
    `;
        });
      }

      function renderChart(data) {
        const ctx = document.getElementById("chart");

        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
          type: "bar",
          data: {
            labels: ["Всего", "Опоздания", "Ранний уход"],
            datasets: [
              {
                label: "Посещаемость",
                data: [data.total, data.late_count, data.early_exit_count],
              },
            ],
          },
        });
      }
      async function downloadExcel() {
  const res = await fetch(`${API_URL}/api/reports/me/export/teacher`, {
    headers: {
      Authorization: `Bearer ${getToken()}`
    }
  });

  if (!res.ok) {
    const err = await res.json();
    alert(err.error || "Ошибка");
    return;
  }

  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "report.xlsx";
  a.click();

  window.URL.revokeObjectURL(url);
}

      loadReport();
    </script>
  </body>
</html>
