<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Группа</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <a href="/admin/groups" class="fw-bold">← Назад</a>

      <h2 class="mt-3">Группа</h2>

      <!-- Информация о группе -->
      <div class="card mb-4">
        <div class="card-body">
          <h5>Информация</h5>
          <p><b>ID:</b> <span id="groupId"></span></p>
          <p><b>Название:</b> <span id="groupName"></span></p>
          <p><b>Отделение:</b> <span id="departmentName"></span></p>
          <p><b>Преподаватель:</b> <span id="teacher"></span></p>
        </div>
      </div>

      <!-- Добавление студента -->
      <div class="card mb-4">
        <div class="card-body">
          <h5>Добавить студента</h5>
          <div class="row g-2">
            <div class="col">
              <input id="studentFio" class="form-control" placeholder="ФИО" />
            </div>
            <div class="col">
              <button class="btn btn-primary w-100" onclick="createStudent()">
                Добавить
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Таблица студентов -->
      <table class="table table-bordered table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>ФИО</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="studentsTable"></tbody>
      </table>
    </div>

    <script>
      const API_URL = "http://localhost:3001";

      function getToken() {
        return localStorage.getItem("authToken");
      }

      const groupId = window.location.pathname.split("/").pop();

      async function fetchGroup() {
        const res = await fetch(`${API_URL}/api/groups/${groupId}`, {
          headers: { Authorization: `Bearer ${getToken()}` },
        });

        const data = await res.json();

        if (data.error) {
          alert(data.error);
          return;
        }

        document.getElementById("groupId").innerText = data.group_id;
        document.getElementById("groupName").innerText = data.group_name;
        document.getElementById("departmentName").innerText =
          data.department_name || "-";
        document.getElementById("teacher").innerText = data.teacher_fio || "-";

        renderStudents(data.students || []);
      }

      function renderStudents(students) {
        const table = document.getElementById("studentsTable");
        table.innerHTML = "";

        students.forEach((s) => {
          const row = `
      <tr>
        <td>${s.student_id}</td>
        <td><input class="form-control" value="${s.fio}" id="fio-${s.student_id}"></td>
        <td>
          <button class="btn btn-sm btn-success" onclick="updateStudent(${s.student_id})">Сохранить</button>
          <button class="btn btn-sm btn-danger" onclick="deleteStudent(${s.student_id})">Удалить</button>
        </td>
      </tr>
    `;
          table.innerHTML += row;
        });
      }

      async function createStudent() {
        const fio = document.getElementById("studentFio").value;

        await fetch(`${API_URL}/api/groups/${groupId}/students`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${getToken()}`,
          },
          body: JSON.stringify({ fio }),
        });

        document.getElementById("studentFio").value = "";
        fetchGroup();
      }

      async function updateStudent(id) {
        const fio = document.getElementById(`fio-${id}`).value;

        await fetch(`${API_URL}/api/students/${id}`, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${getToken()}`,
          },
          body: JSON.stringify({ fio }),
        });

        fetchGroup();
      }

      async function deleteStudent(id) {
        if (!confirm("Удалить студента?")) return;

        await fetch(`${API_URL}/api/students/${id}`, {
          method: "DELETE",
          headers: {
            Authorization: `Bearer ${getToken()}`,
          },
        });

        fetchGroup();
      }

      fetchGroup();
    </script>
  </body>
</html>
